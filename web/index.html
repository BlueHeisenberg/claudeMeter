<body>
  <script>
    // Request fullscreen + landscape on the first user gesture. Browsers
    // require a real gesture for both, so we attach a one-shot listener.
    function _claudeMeterEnterFullscreen() {
      window.removeEventListener('pointerdown', _claudeMeterEnterFullscreen);
      const el = document.documentElement;
      const req = el.requestFullscreen
        ? el.requestFullscreen.bind(el)
        : el.webkitRequestFullscreen
          ? el.webkitRequestFullscreen.bind(el)
          : null;
      if (req) {
        Promise.resolve(req()).then(() => {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
          }
        }).catch(() => {});
      }
    }
    window.addEventListener('pointerdown', _claudeMeterEnterFullscreen, { once: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
