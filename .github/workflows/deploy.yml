name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    outputs:
      proxy_url: ${{ steps.url.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          [ -n "$API_TOKEN" ]  || { echo "::error::Secret CLOUDFLARE_API_TOKEN missing"; exit 1; }
          [ -n "$ACCOUNT_ID" ] || { echo "::error::Secret CLOUDFLARE_ACCOUNT_ID missing"; exit 1; }

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

      - name: Resolve worker URL
        id: url
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          subdomain=$(curl -fsS \
            -H "Authorization: Bearer $API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain // empty')
          if [ -z "$subdomain" ]; then
            echo "::error::Could not fetch workers.dev subdomain. Ensure your API token has 'Workers Scripts: Edit' permission."
            exit 1
          fi
          url="https://claude-meter.${subdomain}.workers.dev"
          echo "Worker URL: $url"
          echo "value=$url" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve base href from repo name
        id: basehref
        run: |
          repo_name="${GITHUB_REPOSITORY##*/}"
          echo "value=/${repo_name}/" >> "$GITHUB_OUTPUT"

      - name: Inject worker URL into web/proxy_url.js
        env:
          PROXY_URL: ${{ needs.worker.outputs.proxy_url }}
        run: |
          printf "window.CLAUDE_METER_PROXY_URL = %s;\n" "'$PROXY_URL'" > web/proxy_url.js
          cat web/proxy_url.js

      - name: Install deps
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --base-href "${{ steps.basehref.outputs.value }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
